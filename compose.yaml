services:
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/paybridge.sql:/docker-entrypoint-initdb.d/paybridge.sql:ro

  app:
    build:
      context: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db

volumes:
  postgres_data:
